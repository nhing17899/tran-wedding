<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Dashboard — Tran & Adam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #fdf6f0;
      --gold:     #c9a96e;
      --red-deep: #3d0a14;
      --red-mid:  #7a1528;
      --red-main: #9b2035;
      --text:     #3e3232;
      --muted:    #7a6a6a;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'Montserrat', sans-serif;
      --display:  'Playfair Display', Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #3d0a14 0%, #7a1228 60%, #9b2035 100%);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      color: #fff;
    }
    .header-eyebrow {
      font-family: var(--sans);
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(255,220,190,.65);
      margin-bottom: .6rem;
    }
    .header-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 300;
      color: rgba(255,235,215,.95);
    }

    /* ── Passcode screen ── */
    #passcode-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 110px);
      padding: 2rem;
    }
    .passcode-card {
      background: #fff;
      border: 1px solid rgba(155,32,53,.15);
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(61,10,20,.08);
    }
    .passcode-label {
      font-family: var(--display);
      font-style: italic;
      font-size: 1.15rem;
      color: var(--red-mid);
      margin-bottom: 1.4rem;
    }
    .passcode-input {
      width: 100%;
      padding: .75rem 1rem;
      font-family: var(--sans);
      font-size: .9rem;
      letter-spacing: .12em;
      border: 1.5px solid rgba(155,32,53,.3);
      background: var(--bg);
      color: var(--text);
      text-align: center;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color .2s;
    }
    .passcode-input:focus { border-color: var(--red-main); }
    .passcode-btn {
      width: 100%;
      padding: .8rem;
      font-family: var(--sans);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .25em;
      text-transform: uppercase;
      background: var(--red-main);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background .2s;
    }
    .passcode-btn:hover { background: var(--red-mid); }
    .passcode-error {
      margin-top: .9rem;
      font-size: .78rem;
      color: var(--red-main);
      display: none;
    }
    .passcode-error.visible { display: block; }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 1.5rem; max-width: 900px; margin: 0 auto; }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: .75rem;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: #fff;
      border: 1px solid rgba(155,32,53,.12);
      padding: 1rem .75rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(61,10,20,.06);
    }
    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--red-deep);
      line-height: 1;
    }
    .stat-label {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: .35rem;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: .4rem 1rem;
      font-family: var(--sans);
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: 1.5px solid rgba(155,32,53,.3);
      background: transparent;
      color: var(--red-main);
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .filter-btn.active,
    .filter-btn:hover {
      background: var(--red-main);
      color: #fff;
      border-color: var(--red-main);
    }

    /* RSVP cards */
    .rsvp-list { display: flex; flex-direction: column; gap: .85rem; }

    .rsvp-card {
      background: #fff;
      border: 1px solid rgba(155,32,53,.12);
      padding: 1.1rem 1.25rem;
      box-shadow: 0 2px 8px rgba(61,10,20,.05);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .5rem 1rem;
      align-items: start;
    }
    .rsvp-flag { font-size: 1.6rem; line-height: 1; padding-top: .1rem; }
    .rsvp-body {}
    .rsvp-name {
      font-family: var(--display);
      font-size: 1.05rem;
      font-style: italic;
      color: var(--red-deep);
      margin-bottom: .3rem;
    }
    .rsvp-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem .75rem;
      margin-bottom: .45rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .2rem .55rem;
    }
    .badge-yes  { background: rgba(34,139,34,.1);  color: #1a6b1a; }
    .badge-no   { background: rgba(155,32,53,.1);  color: var(--red-main); }
    .badge-null { background: rgba(100,90,80,.1);  color: var(--muted); }
    .badge-loc  { background: rgba(201,169,110,.15); color: #7a5e20; }

    .rsvp-message {
      font-family: var(--serif);
      font-style: italic;
      font-size: .95rem;
      color: var(--muted);
      border-left: 2px solid rgba(201,169,110,.5);
      padding-left: .65rem;
      margin-top: .35rem;
    }
    .rsvp-date {
      font-size: .6rem;
      letter-spacing: .08em;
      color: var(--muted);
      margin-top: .45rem;
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      font-family: var(--display);
      font-style: italic;
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* ── Card actions ── */
    .rsvp-actions {
      display: flex;
      gap: .5rem;
      margin-top: .75rem;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: .3rem .8rem;
      font-family: var(--sans);
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: 1.5px solid;
      cursor: pointer;
      transition: background .18s, color .18s;
      background: transparent;
    }
    .action-btn-delete {
      border-color: rgba(155,32,53,.4);
      color: var(--red-main);
    }
    .action-btn-delete:hover {
      background: var(--red-main);
      color: #fff;
    }
    .action-btn-show {
      border-color: rgba(34,139,34,.4);
      color: #1a6b1a;
    }
    .action-btn-show:hover {
      background: rgba(34,139,34,.85);
      color: #fff;
    }
    .action-btn-hide {
      border-color: rgba(100,90,80,.35);
      color: var(--muted);
    }
    .action-btn-hide:hover {
      background: rgba(100,90,80,.15);
      color: var(--text);
    }
    .rsvp-card.greeting-hidden {
      opacity: .65;
    }
    .badge-greeting-on  { background: rgba(34,139,34,.1);  color: #1a6b1a; }
    .badge-greeting-off { background: rgba(100,90,80,.1);  color: var(--muted); }
  </style>
</head>
<body>

  <div class="header">
    <p class="header-eyebrow">Private</p>
    <h1 class="header-title">RSVP Dashboard — Tran &amp; Adam</h1>
  </div>

  <!-- Passcode gate -->
  <div id="passcode-screen">
    <div class="passcode-card">
      <p class="passcode-label">Enter passcode to continue</p>
      <input type="password" id="passcode-input" class="passcode-input" placeholder="••••••" autocomplete="current-password" />
      <button class="passcode-btn" id="passcode-btn">Enter</button>
      <p class="passcode-error" id="passcode-error">Incorrect passcode. Try again.</p>
    </div>
  </div>

  <!-- Dashboard (revealed after auth) -->
  <div id="dashboard">
    <div class="stats" id="stats"></div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="vietnam">🇻🇳 Vietnam</button>
      <button class="filter-btn" data-filter="hungary">🇭🇺 Hungary</button>
    </div>
    <div class="rsvp-list" id="rsvp-list"></div>
  </div>

  <script>
    const SESSION_KEY = 'rsvp_admin_pc';
    let allRsvps = [];
    let activeFilter = 'all';

    // ── Auth ──
    async function fetchRsvps(passcode) {
      const res = await fetch('/api/rsvps', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passcode }),
      });
      if (res.status === 401) throw new Error('unauthorized');
      if (!res.ok)            throw new Error('server');
      return res.json();
    }

    async function tryLogin(passcode) {
      try {
        const data = await fetchRsvps(passcode);
        sessionStorage.setItem(SESSION_KEY, passcode);
        allRsvps = data.rsvps;
        showDashboard();
      } catch (err) {
        if (err.message === 'unauthorized') {
          document.getElementById('passcode-error').classList.add('visible');
        }
      }
    }

    document.getElementById('passcode-btn').addEventListener('click', () => {
      const pc = document.getElementById('passcode-input').value.trim();
      if (pc) tryLogin(pc);
    });
    document.getElementById('passcode-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('passcode-btn').click();
    });

    // Auto-login if passcode cached in session
    const cached = sessionStorage.getItem(SESSION_KEY);
    if (cached) tryLogin(cached);

    // ── Dashboard ──
    function showDashboard() {
      document.getElementById('passcode-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      renderStats();
      renderList();
    }

    function renderStats() {
      const total  = allRsvps.length;
      const vnAll  = allRsvps.filter(r => r.location === 'vietnam');
      const huAll  = allRsvps.filter(r => r.location === 'hungary');
      const vnYes  = vnAll.filter(r => r.attendCeremony === true).length;
      const huCer  = huAll.filter(r => r.attendCeremony === true).length;
      const huDin  = huAll.filter(r => r.attendDinner  === true).length;
      const extra  = huAll.reduce((s, r) => s + (r.extraGuests || 0), 0);

      const stats = [
        { n: total,        label: 'Total Responses' },
        { n: vnAll.length, label: '🇻🇳 Vietnam RSVPs' },
        { n: vnYes,        label: 'Vietnam Attending' },
        { n: huAll.length, label: '🇭🇺 Hungary RSVPs' },
        { n: huCer,        label: 'Hungary Ceremony' },
        { n: huDin,        label: 'Hungary Dinner' },
        { n: extra,        label: 'Extra Guests' },
      ];

      document.getElementById('stats').innerHTML = stats.map(s =>
        `<div class="stat-card">
          <div class="stat-number">${s.n}</div>
          <div class="stat-label">${s.label}</div>
        </div>`
      ).join('');
    }

    function renderList() {
      const list = activeFilter === 'all'
        ? allRsvps
        : allRsvps.filter(r => r.location === activeFilter);

      const el = document.getElementById('rsvp-list');

      if (!list.length) {
        el.innerHTML = '<p class="empty">No responses yet.</p>';
        return;
      }

      el.innerHTML = list.map(r => {
        const flag    = r.location === 'vietnam' ? '🇻🇳' : '🇭🇺';
        const locLabel = r.location === 'vietnam' ? 'Vietnam' : 'Hungary';
        const date    = new Date(r.submittedAt).toLocaleString('en-GB', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });

        const cerBadge = badge(r.attendCeremony, 'Ceremony');
        const dinBadge = r.location === 'hungary' ? badge(r.attendDinner, 'Dinner') : '';
        const extBadge = r.location === 'hungary' && r.extraGuests > 0
          ? `<span class="badge badge-loc">+${r.extraGuests} guest${r.extraGuests > 1 ? 's' : ''}</span>` : '';

        const greetingEnabled = r.greetingEnabled !== false; // default true for old records
        const msgBlock = r.message ? [
          `<p class="rsvp-message">"${escHtml(r.message)}"</p>`,
          `<span class="badge ${greetingEnabled ? 'badge-greeting-on' : 'badge-greeting-off'}">`,
          greetingEnabled ? '✦ Wish shown' : '✦ Wish hidden',
          `</span>`,
        ].join('') : '';

        const greetingBtn = r.message ? (
          greetingEnabled
            ? `<button class="action-btn action-btn-hide" data-id="${r._id}" data-action="hide">Hide Wish</button>`
            : `<button class="action-btn action-btn-show" data-id="${r._id}" data-action="show">Show Wish</button>`
        ) : '';

        const hiddenClass = greetingEnabled ? '' : ' greeting-hidden';

        return `<div class="rsvp-card${hiddenClass}" data-id="${r._id}">
          <div class="rsvp-flag">${flag}</div>
          <div class="rsvp-body">
            <div class="rsvp-name">${escHtml(r.name)}</div>
            <div class="rsvp-meta">
              <span class="badge badge-loc">${locLabel}</span>
              ${cerBadge}${dinBadge}${extBadge}
            </div>
            ${msgBlock}
            <div class="rsvp-date">${date}</div>
            <div class="rsvp-actions">
              ${greetingBtn}
              <button class="action-btn action-btn-delete" data-id="${r._id}" data-action="delete">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('');

      // Attach action handlers
      el.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.id));
      });
    }

    function badge(val, label) {
      if (val === true)  return `<span class="badge badge-yes">✓ ${label}</span>`;
      if (val === false) return `<span class="badge badge-no">✗ ${label}</span>`;
      return `<span class="badge badge-null">? ${label}</span>`;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Filters ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList();
      });
    });

    // ── Card Actions (delete / show / hide wish) ──
    async function handleAction(action, id) {
      const passcode = sessionStorage.getItem(SESSION_KEY);

      if (action === 'delete') {
        if (!confirm('Delete this RSVP? This cannot be undone.')) return;
        try {
          const res = await fetch('/api/rsvp-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ passcode, id }),
          });
          if (!res.ok) throw new Error();
          allRsvps = allRsvps.filter(r => r._id !== id);
          renderStats();
          renderList();
        } catch {
          alert('Failed to delete. Please try again.');
        }
        return;
      }

      const enabled = action === 'show';
      try {
        const res = await fetch('/api/rsvp-toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passcode, id, enabled }),
        });
        if (!res.ok) throw new Error();
        const idx = allRsvps.findIndex(r => r._id === id);
        if (idx !== -1) allRsvps[idx].greetingEnabled = enabled;
        renderList();
      } catch {
        alert('Failed to update. Please try again.');
      }
    }
  </script>
</body>
</html>
